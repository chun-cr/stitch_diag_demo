name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  flutter-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Check hardcoded Chinese UI strings
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python3 scripts/check_hardcoded_cjk.py --diff "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"
          else
            python3 scripts/check_hardcoded_cjk.py --diff "${{ github.event.before }}" "${{ github.sha }}"
          fi

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
